<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH | Admissibility Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-nav">
        <button id="aboutToggle">SYSTEM_INFO</button>
    </div>

    <header>
        <div class="logo-group">
            <span id="statusDot"></span>
            <h1>NORTH</h1>
        </div>
        <p class="subtitle">UTCP ADMISSIBILITY GATEWAY</p>
    </header>

    <main class="centered-content">
        <div class="engine-selector">
            <span class="engine-option active" data-model="open-mistral-7b">MISTRAL-7B</span>
            <span class="engine-option" data-model="gpt-4o">GPT-4O</span>
            <span class="engine-option" data-model="claude-3">CLAUDE-3</span>
        </div>

        <div class="input-area">
            <textarea id="prompt" placeholder="Enter intent for evaluation..."></textarea>
            
            <div class="action-row">
                <button id="btnEvaluate" onclick="evaluateGate()" title="Initiate Audit"></button>
            </div>

            <div id="aboutContent" class="hidden about-box">
                <div class="metadata-lineage">
                    <p><strong>MISSION:</strong> Reduce model drift via triadic constraint (I/R/Sem).</p>
                    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
                    <div style="font-family: monospace; font-size: 0.7rem; color: #666;">
                        LINEAGE_ID: <span id="branchId">NONE</span><br>
                        LAST_IRS: [<span id="scoreI">-</span>, <span id="scoreR">-</span>, <span id="scoreSem">-</span>] / <span id="scoreRho">-</span>
                    </div>
                </div>
            </div>

            <div id="errorBox" class="hidden"></div>
        </div>

        <section id="outputCard" class="hidden">
            <div id="fmo"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
