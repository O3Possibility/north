<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH | AI Admissibility Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: black; color: white; font-family: sans-serif;">
    <header style="padding: 20px;">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="statusDot" style="height: 12px; width: 12px; background-color: #52525b; border-radius: 50%;"></span>
            <h1 style="margin: 0; font-size: 1.5rem;">NORTH</h1>
        </div>
        <p style="color: #71717a; margin: 5px 0 0 22px;">AI Admissibility Engine</p>
    </header>

    <main style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <label for="prompt" style="color: #a1a1aa;">Prompt</label>
            <textarea id="prompt" placeholder="Enter a prompt..." style="width: 100%; height: 150px; background: #18181b; color: white; border: 1px solid #27272a; border-radius: 8px; padding: 10px;"></textarea>
            
            <button id="btnEvaluate" style="width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Evaluate</button>
            
            <div id="statusRow" class="hidden" style="display: flex; align-items: center; gap: 8px; font-size: 0.875rem;">
                <span id="statusText"></span>
                <span id="timingText" style="color: #71717a;"></span>
            </div>

            <div style="font-size: 0.75rem; color: #71717a;">
                API: <span id="apiLabel" style="color: #3b82f6;">Connecting...</span>
            </div>
            <div id="warmNote" style="font-size: 0.75rem; color: #71717a;"></div>
            <div id="errorBox" class="hidden" style="color: #ef4444; border: 1px solid #ef4444; padding: 10px; border-radius: 8px;"></div>
        </div>

        <section id="outputCard" class="hidden" style="margin-top: 30px; border-top: 1px solid #27272a; padding-top: 20px;">
            <div id="fmo" style="background: #09090b; padding: 20px; border-radius: 12px; border: 1px solid #27272a;"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="pillGuide" style="background: #27272a; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer;">View Analysis</button>
                <button id="pillModel" style="background: #27272a; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer;">Model: <span id="modelNamePill">Default</span></button>
            </div>
        </section>

        <div id="guideDrawer" class="hidden">
            <span id="scoreI"></span><span id="scoreR"></span><span id="scoreSem"></span>
            <span id="scoreL"></span><span id="scoreTau"></span><span id="scoreRho"></span>
            <span id="scoreRhoCrit"></span><span id="eventType"></span><span id="nReads"></span>
            <span id="deltaL"></span><span id="refusalRate"></span><span id="branchDepth"></span>
            <span id="branchId"></span><span id="parentBranchId"></span>
            <div id="lineage"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
