<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-group">
            <span id="statusDot"></span>
            <h1>NORTH</h1>
        </div>
        <p class="subtitle">AI Admissibility Engine</p>
    </header>

    <main>
        <div class="input-area">
            <textarea id="prompt" placeholder="Enter intent..."></textarea>
            
            <div class="action-row">
                <button id="btnEvaluate" onclick="evaluateGate()" title="Evaluate Intent"></button>
            </div>

            <div id="errorBox" class="hidden"></div>

            <div class="about-section">
                <button id="aboutToggle">About</button>
                <div id="aboutContent" class="hidden">
                    <p>NORTH is a model-agnostic layer that evaluates intent through governance, science, philosophy, engineering, and culture.</p>
                </div>
            </div>
        </div>

        <section id="outputCard" class="hidden">
            <div id="fmo"></div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById("aboutToggle").addEventListener("click", function() {
            const content = document.getElementById("aboutContent");
            content.classList.toggle("hidden");
        });
    </script>
</body>
</html>
