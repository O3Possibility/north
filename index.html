<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTH | Admissibility Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background:#000; color:#eee; font-family:sans-serif;">
    <div class="top-nav" style="padding:20px; text-align:right;">
        <button id="aboutToggle" style="background:none; border:1px solid #333; color:#666; font-size:10px; cursor:pointer; padding:5px 10px;">SYSTEM_INFO</button>
    </div>

    <header style="text-align:center; margin-bottom:40px;">
        <h1 style="letter-spacing:10px; margin:0;">NORTH</h1>
        <p style="color:#666; font-size:10px; letter-spacing:2px;">UTCP ADMISSIBILITY GATEWAY</p>
    </header>

    <main style="max-width:600px; margin:0 auto; padding:0 20px;">
        <div class="engine-selector" style="display:flex; justify-content:center; gap:20px; margin-bottom:30px; font-size:10px; color:#444; cursor:pointer;">
            <span class="engine-option active" data-model="open-mistral-7b" style="border-bottom:1px solid #fff; color:#fff;">MISTRAL-7B</span>
            <span class="engine-option" data-model="gpt-4o">GPT-4O</span>
            <span class="engine-option" data-model="claude-3">CLAUDE-3</span>
        </div>

        <div id="aboutContent" class="hidden" style="background:#0a0a0a; border:1px solid #222; padding:15px; margin-bottom:20px; font-size:11px; color:#888;">
            <p><strong>MISSION:</strong> Triadic Constraint Audit (I/R/Sem)</p>
            <p>LINEAGE_ID: <span id="branchId" style="color:#eee;">NONE</span></p>
        </div>

        <div class="input-area">
            <textarea id="prompt" style="width:100%; height:120px; background:#050505; border:1px solid #222; color:#fff; padding:15px; box-sizing:border-box; border-radius:8px;" placeholder="Enter intent for evaluation..."></textarea>
            <button id="btnEvaluate" onclick="evaluateGate()" style="width:100%; margin-top:15px; padding:15px; background:#fff; color:#000; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">INITIATE AUDIT</button>
            <div id="errorBox" class="hidden" style="margin-top:20px; color:#f44; font-size:12px; border:1px solid #411; padding:10px; background:#200;"></div>
        </div>

        <section id="outputCard" class="hidden" style="margin-top:40px;">
            <div id="fmo" style="line-height:1.6; font-size:14px; color:#ccc;"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
